services:
  postgres:
    image: postgres:15-alpine
    container_name: medfield-db
    environment:
      POSTGRES_DB: medfield
      POSTGRES_USER: medfield_user
      POSTGRES_PASSWORD: medfield_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medfield_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: medfield-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: medfield-backend:latest
    container_name: medfield-api
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: medfield
      DB_USER: medfield_user
      DB_PASSWORD: medfield_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      JWT_SECRET: medfield_jwt_secret_2026_secure
      JWT_EXPIRES_IN: 7d
      REFRESH_TOKEN_SECRET: medfield_refresh_secret_2026_secure
    ports:
      - "3005:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    image: medfield-dashboard:latest
    container_name: medfield-dashboard
    ports:
      - "3006:80"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
